# ─────────────────────────────────────────────────────────────────────────────
# Security & quality pipeline — marketing website
#
# 100% free, no external accounts. Security tools run via CLI (npm / pip / curl);
# the only GitHub Actions used are GitHub's own, pinned to commit SHAs.
#
# Hard gates (fail the run):  npm audit · Semgrep (SAST) · gitleaks · build
# Report-only:                license check · SBOM (uploaded as a build artifact)
# ─────────────────────────────────────────────────────────────────────────────
name: CI Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    name: Security & build checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history — needed for secret scan)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (exact lockfile)
        run: npm ci

      # 1) Dependency vulnerabilities — fail on high/critical
      - name: npm audit
        run: npm audit --audit-level=high

      # 2) SAST — scan our own code for security bugs (Semgrep OSS, no account)
      #    Tune down with `--severity ERROR` or make report-only if it's noisy.
      - name: Semgrep (SAST)
        run: |
          python3 -m pip install --quiet semgrep
          semgrep scan --config auto --error

      # 3) Secret scanning — gitleaks CLI (no account, no org license key)
      - name: gitleaks (secret scan)
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . --redact --exit-code 1

      # 4) License scan — surface dependency licenses (report-only)
      - name: License check
        run: npx --yes license-checker --production --summary || true

      # 5) SBOM — CycloneDX, generated by npm itself (no extra tool/account)
      - name: Generate SBOM
        if: always()
        run: npm sbom --sbom-format cyclonedx > sbom.cyclonedx.json

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json

      # 6) Build — marketing sites build with no secrets required
      - name: Build
        run: npm run build
